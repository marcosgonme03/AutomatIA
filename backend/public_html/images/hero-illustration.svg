<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background circles -->
  <circle cx="200" cy="200" r="180" fill="url(#grad1)" opacity="0.1"/>
  <circle cx="200" cy="200" r="150" fill="none" stroke="url(#grad1)" stroke-width="1" opacity="0.2"/>

  <!-- Central sphere with nodes -->
  <g filter="url(#glow)">
    <circle cx="200" cy="200" r="50" fill="url(#grad1)"/>

    <!-- Orbiting nodes -->
    <circle cx="280" cy="150" r="12" fill="#06b6d4" opacity="0.8"/>
    <circle cx="300" cy="220" r="12" fill="#7c3aed" opacity="0.8"/>
    <circle cx="260" cy="280" r="12" fill="#10b981" opacity="0.8"/>
    <circle cx="150" cy="290" r="12" fill="#f59e0b" opacity="0.8"/>
    <circle cx="90" cy="240" r="12" fill="#ef4444" opacity="0.8"/>
    <circle cx="110" cy="150" r="12" fill="#8b5cf6" opacity="0.8"/>

    <!-- Connecting lines -->
    <line x1="200" y1="200" x2="280" y2="150" stroke="url(#grad1)" stroke-width="2" opacity="0.4"/>
    <line x1="200" y1="200" x2="300" y2="220" stroke="url(#grad1)" stroke-width="2" opacity="0.4"/>
    <line x1="200" y1="200" x2="260" y2="280" stroke="url(#grad1)" stroke-width="2" opacity="0.4"/>
    <line x1="200" y1="200" x2="150" y2="290" stroke="url(#grad1)" stroke-width="2" opacity="0.4"/>
    <line x1="200" y1="200" x2="90" y2="240" stroke="url(#grad1)" stroke-width="2" opacity="0.4"/>
    <line x1="200" y1="200" x2="110" y2="150" stroke="url(#grad1)" stroke-width="2" opacity="0.4"/>
  </g>

  <!-- Animated pulse -->
  <circle cx="200" cy="200" r="50" fill="none" stroke="url(#grad1)" stroke-width="2" opacity="0.5">
    <animate attributeName="r" values="50;70;50" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="stroke-width" values="2;1;2" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0;0.5" dur="3s" repeatCount="indefinite"/>
  </circle>
</svg>
