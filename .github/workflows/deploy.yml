name: Deploy to cPanel

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SFTP
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y sshpass rsync

          sshpass -p "${{ secrets.FTP_PASSWORD }}" rsync -avz \
            --delete \
            --exclude='backend' \
            --exclude='.github' \
            --exclude='.claude' \
            --exclude='node_modules' \
            --exclude='.git' \
            --exclude='.gitignore' \
            ./ \
            "${{ secrets.FTP_USERNAME }}@${{ secrets.FTP_SERVER }}:/home/marcosco/public_html/AutomatIA/"

      - name: Deployment Success
        if: success()
        run: echo "✅ Deployment to cPanel completed successfully!"

      - name: Deployment Failed
        if: failure()
        run: echo "❌ Deployment failed. Check SFTP credentials."
