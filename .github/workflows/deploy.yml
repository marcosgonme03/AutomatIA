name: Deploy to cPanel

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SFTP
        env:
          SSH_HOST: ${{ secrets.FTP_SERVER }}
          SSH_USER: ${{ secrets.FTP_USERNAME }}
          SSH_PASS: ${{ secrets.FTP_PASSWORD }}
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y sshpass rsync

          mkdir -p ~/.ssh
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

          sshpass -p "$SSH_PASS" rsync -avz \
            --delete \
            -e "ssh -o StrictHostKeyChecking=no" \
            --exclude=backend \
            --exclude=.github \
            --exclude=.claude \
            --exclude=node_modules \
            --exclude=.git \
            --exclude=.gitignore \
            ./ \
            "${SSH_USER}@${SSH_HOST}:/home/marcosco/public_html/AutomatIA/"

      - name: Deployment Success
        if: success()
        run: echo "✅ Deployment to cPanel completed successfully!"

      - name: Deployment Failed
        if: failure()
        run: echo "❌ Deployment failed. Check SFTP credentials."
