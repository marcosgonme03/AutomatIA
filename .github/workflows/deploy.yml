name: Deploy to cPanel

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Sync files to cPanel via FTP
        uses: airvzxf/ftp-action@v1.2
        with:
          host: ${{ secrets.FTP_SERVER }}
          user: ${{ secrets.FTP_USERNAME }}
          passwd: ${{ secrets.FTP_PASSWORD }}
          local_dir: ./backend/public_html
          remote_dir: /home/marcosco/public_html/AutomatIA
          delete: false
          verbose: true

      - name: Deployment Success
        if: success()
        run: echo "✅ Deployment to cPanel completed successfully!"

      - name: Deployment Failed
        if: failure()
        run: echo "❌ Deployment failed. Check FTP credentials and connection."
