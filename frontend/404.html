<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Página no encontrada — AutomatIA Pro">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect fill='%237c3aed' width='32' height='32' rx='8'/><text x='50%' y='50%' font-size='20' font-weight='900' fill='white' text-anchor='middle' dominant-baseline='central'>A</text></svg>">
<title>404 — Página No Encontrada | AutomatIA Pro</title>
<link rel="stylesheet" href="/AutomatIA/css/main.css">
<style>
  .error-container {
    min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; justify-content: center; text-align: center;
    padding: 40px 20px; position: relative; z-index: 1;
  }
  .error-code { font-size: clamp(5rem, 15vw, 12rem); font-weight: 900; line-height: 1;
    background: linear-gradient(135deg, #7c3aed, #06b6d4);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text; margin: 0; animation: fadeDown .6s .1s ease both;
  }
  .error-title { font-size: clamp(1.5rem, 4vw, 2.5rem); font-weight: 800;
    margin: 20px 0 16px 0; animation: fadeDown .6s .2s ease both;
  }
  .error-desc { color: var(--muted); font-size: clamp(.95rem, 2vw, 1.1rem);
    max-width: 520px; margin: 0 auto 40px; line-height: 1.7;
    animation: fadeDown .6s .3s ease both;
  }
  .error-actions { display: flex; gap: 14px; justify-content: center; flex-wrap: wrap;
    animation: fadeDown .6s .4s ease both;
  }
  .error-illustration {
    font-size: 8rem; margin: 40px 0; opacity: .7;
    animation: float 3s ease-in-out infinite;
  }
  @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
  @keyframes fadeDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: none; } }

  .breadcrumb { color: var(--muted); font-size: .9rem; margin: 60px 0 40px 0; }
  .breadcrumb a { color: var(--cyan); text-decoration: none; }
  .breadcrumb a:hover { text-decoration: underline; }
</style>
</head>
<body>
<div class="grid-bg"></div>
<canvas id="canvas"></canvas>
<div id="nav-placeholder"></div>

<div class="error-container">
  <div class="error-illustration">🚀</div>
  <h1 class="error-code">404</h1>
  <h2 class="error-title">Página No Encontradaa</h2>
  <p class="error-desc">Lo sentimos, la página que buscas no existe o ha sido movida. Vuelve al inicio o explora nuestros servicios.</p>

  <div class="error-actions">
    <a href="/AutomatIA/" class="btn-primary">← Volver al inicio</a>
    <a href="/AutomatIA/services.html" class="btn-secondary">Ver servicios →</a>
    <a href="/AutomatIA/contact.html" class="btn-secondary">Contactar</a>
  </div>

  <div class="breadcrumb">
    <a href="/AutomatIA/">Inicio</a> / 404
  </div>
</div>

<script src="/AutomatIA/js/common.js"></script>
</body>
</html>
