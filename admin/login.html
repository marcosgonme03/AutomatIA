<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — AutomatIA Pro</title>
<link rel="stylesheet" href="../css/main.css">
<style>
  body { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .login-box {
    width: 100%; max-width: 400px; padding: 0 20px;
    position: relative; z-index: 1;
    animation: fadeUp .5s ease both;
  }
  .login-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 20px; padding: 40px;
  }
  .login-logo { text-align: center; margin-bottom: 28px; }
  .login-logo a { font-size: 1.4rem; font-weight: 800; background: linear-gradient(135deg,var(--primary-light),var(--cyan)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-decoration: none; }
  .login-logo p { color: var(--muted); font-size: .82rem; margin-top: 4px; }
  .login-card h2 { font-size: 1.3rem; font-weight: 700; margin-bottom: 24px; }
  #login-form { display: flex; flex-direction: column; gap: 16px; }
  #login-form .btn-primary { justify-content: center; font-size: 1rem; padding: 14px; }
  .login-error { background: rgba(239,68,68,.1); border: 1px solid rgba(239,68,68,.3); border-radius: 10px; padding: 12px 16px; font-size: .88rem; color: #f87171; display: none; }
  .back-link { text-align: center; margin-top: 20px; }
  .back-link a { color: var(--muted); font-size: .83rem; text-decoration: none; }
  .back-link a:hover { color: var(--text); }
</style>
</head>
<body>
<div class="blob blob1"></div><div class="blob blob2"></div>
<div class="grid-bg"></div><canvas id="canvas"></canvas>

<div class="login-box">
  <div class="login-logo">
    <a href="../">AutomatIA<span style="font-family:'JetBrains Mono',monospace">.pro</span></a>
    <p>Panel de administración</p>
  </div>
  <div class="login-card">
    <h2>Iniciar sesión</h2>
    <div class="login-error" id="login-error"></div>
    <form id="login-form">
      <div class="form-group">
        <label for="username">Usuario</label>
        <input type="text" id="username" name="username" placeholder="admin" required autocomplete="username">
      </div>
      <div class="form-group">
        <label for="password">Contraseña</label>
        <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn-primary" id="login-btn">Entrar al panel →</button>
    </form>
  </div>
  <div class="back-link"><a href="../">← Volver a la web</a></div>
</div>

<!-- particles only for bg -->
<script>
  // redirect if already logged in
  if (localStorage.getItem('admin_token')) window.location.href = '../admin/dashboard.html';

  document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('login-btn');
    const err = document.getElementById('login-error');
    err.style.display = 'none';
    btn.disabled = true; btn.textContent = 'Entrando...';

    try {
      const res = await fetch('../api/admin/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          username: document.getElementById('username').value,
          password: document.getElementById('password').value,
        }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Error');
      localStorage.setItem('admin_token', data.token);
      localStorage.setItem('admin_user', data.username);
      window.location.href = '../admin/dashboard.html';
    } catch (e) {
      err.textContent = e.message;
      err.style.display = 'block';
      btn.disabled = false; btn.textContent = 'Entrar al panel →';
    }
  });

  // minimal particles for bg
  const canvas = document.getElementById('canvas');
  if (canvas) {
    canvas.style.display = 'block';
    Object.assign(canvas.style, { position:'fixed',inset:0,zIndex:0,pointerEvents:'none' });
    const ctx = canvas.getContext('2d');
    let W = canvas.width = window.innerWidth, H = canvas.height = window.innerHeight;
    window.addEventListener('resize', () => { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; });
    const pts = Array.from({length:60}, () => ({ x:Math.random()*W, y:Math.random()*H, vx:(Math.random()-.5)*.2, vy:(Math.random()-.5)*.2, r:Math.random()+.3, a:Math.random()*.4+.1, c:Math.random()>.5?'#7c3aed':'#06b6d4' }));
    (function loop(){ ctx.clearRect(0,0,W,H); pts.forEach(p=>{ p.x+=p.vx; p.y+=p.vy; if(p.x<0||p.x>W||p.y<0||p.y>H){p.x=Math.random()*W;p.y=Math.random()*H;} ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle=p.c;ctx.globalAlpha=p.a;ctx.fill(); }); ctx.globalAlpha=1; requestAnimationFrame(loop); })();
  }
</script>
</body>
</html>
