name: Deploy to cPanel

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via FTP
        run: |
          sudo apt-get update
          sudo apt-get install -y ncftp
          ncftpput -R -v -u "${{ secrets.FTP_USERNAME }}" -p "${{ secrets.FTP_PASSWORD }}" "${{ secrets.FTP_SERVER }}" "/home/marcosco/public_html/AutomatIA" . \
            --exclude "^backend$" \
            --exclude "^.github$" \
            --exclude "^.claude$" \
            --exclude "^node_modules$" \
            --exclude "^.git$"

      - name: Deployment Success
        if: success()
        run: echo "✅ Deployment to cPanel completed successfully!"

      - name: Deployment Failed
        if: failure()
        run: echo "❌ Deployment failed. Check FTP credentials and connection."
